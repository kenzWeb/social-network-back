services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-social_network}
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-social_network}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  seed:
    image: golang:1.25-alpine
    profiles:
      - tools
    working_dir: /work
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_SSLMODE: disable
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/work
      - go_cache:/go/pkg/mod
    command: sh -c 'go run ./cmd/seed_all'

volumes:
  postgres_data:
  uploads_data:
  go_cache:
