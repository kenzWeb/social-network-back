# Air config for hot reload
root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/app.exe ./cmd"
entrypoint = ["tmp\\app.exe"]
full_bin = "tmp/app.exe"
include_ext = ["go", "tpl", "tmpl", "html", "env"]
exclude_dir = ["tmp", "vendor", "node_modules", ".git", "migrations"]
exclude_regex = ["_test.go$"]
delay = 1000 # ms
kill_delay = 500
stop_on_error = true

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"
