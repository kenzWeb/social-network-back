basePath: /api/v1
definitions:
  handlers.CreateUserRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 6
        type: string
      username:
        type: string
    required:
    - email
    - password
    - username
    type: object
  handlers.PostResponse:
    properties:
      comments_count:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: string
      image_url:
        type: string
      likes_count:
        type: integer
      user_id:
        type: string
    type: object
  handlers.StoryResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      media_type:
        type: string
      media_url:
        type: string
    type: object
  handlers.UpdatePostRequest:
    properties:
      content:
        type: string
      imageUrl:
        type: string
    type: object
  handlers.UpdateUserRequest:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      email:
        type: string
      first_name:
        type: string
      is_2fa_enabled:
        type: boolean
      is_active:
        type: boolean
      is_verified:
        type: boolean
      last_name:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  handlers.UserDTO:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      followers_count:
        type: integer
      following_count:
        type: integer
      id:
        type: string
      is_2fa_enabled:
        type: boolean
      is_active:
        type: boolean
      is_verified:
        type: boolean
      last_name:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  handlers.UserStoriesResponse:
    properties:
      avatar_url:
        type: string
      id:
        type: string
      stories:
        items:
          $ref: '#/definitions/handlers.StoryResponse'
        type: array
      username:
        type: string
    type: object
  handlers.actorInfo:
    properties:
      avatar_url:
        type: string
      first_name:
        type: string
      id:
        type: string
      is_verified:
        type: boolean
      last_name:
        type: string
      username:
        type: string
    type: object
  handlers.notificationListResponse:
    properties:
      notifications:
        items:
          $ref: '#/definitions/handlers.notificationResponse'
        type: array
      unread_count:
        type: integer
    type: object
  handlers.notificationResponse:
    properties:
      actor:
        $ref: '#/definitions/handlers.actorInfo'
      created_at:
        type: string
      id:
        type: string
      read:
        type: boolean
      target_id:
        type: string
      type:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for Modern Social Network
  title: Modern Social Network API
  version: "1.0"
paths:
  /auth/me:
    get:
      description: Get the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UserDTO'
      summary: Get current user
      tags:
      - users
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user
      parameters:
      - description: User registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.UserDTO'
      summary: Create user
      tags:
      - users
  /notifications:
    get:
      description: Get all notifications for the authenticated user
      parameters:
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.notificationListResponse'
      security:
      - BearerAuth: []
      summary: Get notifications
      tags:
      - notifications
  /notifications/{id}:
    delete:
      description: Delete a specific notification
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete notification
      tags:
      - notifications
  /notifications/{id}/read:
    patch:
      description: Mark a specific notification as read
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark notification as read
      tags:
      - notifications
  /notifications/read-all:
    patch:
      description: Mark all notifications as read for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Mark all notifications as read
      tags:
      - notifications
  /notifications/unread:
    get:
      description: Get unread notifications for the authenticated user
      parameters:
      - default: 20
        description: Limit
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.notificationListResponse'
      security:
      - BearerAuth: []
      summary: Get unread notifications
      tags:
      - notifications
  /notifications/unread/count:
    get:
      description: Get the count of unread notifications
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              format: int64
              type: integer
            type: object
      security:
      - BearerAuth: []
      summary: Get unread count
      tags:
      - notifications
  /posts:
    get:
      description: Get posts by user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.PostResponse'
            type: array
      summary: Get user posts
      tags:
      - posts
    post:
      consumes:
      - multipart/form-data
      description: Create a new post with optional image
      parameters:
      - description: Post content
        in: formData
        name: content
        required: true
        type: string
      - description: Post image
        in: formData
        name: image
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.PostResponse'
      summary: Create post
      tags:
      - posts
  /posts/{id}:
    put:
      consumes:
      - application/json
      description: Update a post
      parameters:
      - description: Post ID
        in: path
        name: id
        required: true
        type: string
      - description: Post content
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdatePostRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.PostResponse'
      summary: Update post
      tags:
      - posts
  /posts/all:
    get:
      description: Get posts post all users
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.PostResponse'
            type: array
      summary: Get all posts
      tags:
      - posts
  /story:
    post:
      consumes:
      - multipart/form-data
      description: Upload a new story (image or video)
      parameters:
      - description: Story media file
        in: formData
        name: media
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handlers.StoryResponse'
      summary: Create a new story
      tags:
      - stories
  /story/following:
    get:
      description: Get stories from followed users
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.UserStoriesResponse'
            type: array
      summary: Get stories feed
      tags:
      - stories
  /users:
    get:
      description: Get a list of all users
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.UserDTO'
            type: array
      summary: Get all users
      tags:
      - users
  /users/{id}:
    get:
      description: Get user details by ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UserDTO'
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update user details
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: User update details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UserDTO'
      summary: Update user
      tags:
      - users
  /users/email/{email}:
    get:
      description: Get user details by email
      parameters:
      - description: User Email
        in: path
        name: email
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UserDTO'
      summary: Get user by email
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
